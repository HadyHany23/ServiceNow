<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Todo Directive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .completed {
        text-decoration: line-through;
        opacity: 0.6;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5" ng-app="myApp" ng-controller="myCtrl">
      <h3 class="mb-3">Todo App</h3>

      <todo-list tasks="tasks"></todo-list>

      <p class="mt-3">Total Tasks: {{tasks.length}}</p>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope) {
        $scope.tasks = [
          { title: "Study AngularJS", completed: false },
          { title: "Build small project", completed: false },
        ];
      });

      app.directive("todoList", function () {
        return {
          scope: { tasks: "=" },
          template: `
      <div class="card p-3 shadow">

        <!-- Add Task -->
        <div class="d-flex gap-2 mb-3">
          <input type="text"
                 class="form-control"
                 placeholder="Enter new task"
                 ng-model="newTask">

          <button class="btn btn-primary"
                  ng-click="addTask()">
            Add
          </button>
        </div>

        <!-- Tasks List -->
        <ul class="list-group">

          <li class="list-group-item d-flex justify-content-between align-items-center"
              ng-repeat="task in tasks"
              >

            <div>
              <input type="checkbox"
                     ng-model="taskCompleted"
                     class="form-check-input me-2">

              <span ng-class="{'completed': taskCompleted}">{{task.title}}</span>
            </div>

            <button class="btn btn-sm btn-danger"
                    ng-click="deleteTask($index)">
              X
            </button>

          </li>

        </ul>

      </div>
    `,
          link: function (scope) {
            scope.addTask = function () {
              if (!scope.newTask) return;

              scope.tasks.push({
                title: scope.newTask,
                completed: false,
              });

              scope.newTask = "";
            };

            scope.deleteTask = function (index) {
              scope.tasks.splice(index, 1);
            };
          },
        };
      });
    </script>
  </body>
</html>
