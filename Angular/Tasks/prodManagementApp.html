<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 20px 0;
      }
      .editing-row {
        background-color: #fff3cd !important;
      }
      .help-block {
        color: #dc3545;
        font-size: 0.875em;
      }
      .error {
        border: 1px solid red;
      }
    </style>
  </head>

  <body ng-app="myApp" ng-controller="myCtrl">
    <div class="container mt-4">
      <h2 class="mb-4 text-center">Product Inventory System</h2>

      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white">
          <span ng-if="isEditing">Edit Product (ID: {{productData.id}})</span>
          <span ng-if="!isEditing">Add New Product</span>
        </div>
        <div class="card-body">
          <form
            name="prodForm"
            ng-submit="prodForm.$valid && saveProduct()"
            novalidate
          >
            <div class="row">
              <div class="col-md-5 mb-3">
                <input
                  type="text"
                  name="title"
                  class="form-control"
                  placeholder="Product Title"
                  ng-model="productData.title"
                  minlength="3"
                  required
                  ng-class="{ 'error': prodForm.title.$invalid && prodForm.title.$touched }"
                />
                <small
                  class="help-block"
                  ng-if="prodForm.title.$touched && prodForm.title.$error.required"
                >
                  Title is required
                </small>

                <small
                  class="help-block"
                  ng-if="prodForm.title.$touched && prodForm.title.$error.minlength"
                >
                  Minimum 3 characters required
                </small>
              </div>
              <div class="col-md-5 mb-3">
                <input
                  type="text"
                  name="category"
                  class="form-control"
                  placeholder="Price or Category"
                  ng-model="productData.body"
                  required
                  ng-class="{ 'error': prodForm.category.$invalid && prodForm.category.$touched }"
                />
                <small
                  class="help-block"
                  ng-if="prodForm.category.$touched && prodForm.category.$error.required"
                >
                  Category is required
                </small>

                <small
                  class="help-block"
                  ng-if="prodForm.category.$touched && prodForm.category.$error.minlength"
                >
                  Minimum 3 characters required
                </small>
              </div>
              <div class="col-md-2 mb-3">
                <button
                  type="submit"
                  class="btn w-100"
                  ng-class="isEditing ? 'btn-warning' : 'btn-primary'"
                  ng-disabled="isSubmitting || prodForm.$invalid"
                >
                  <span
                    ng-show="isSubmitting"
                    class="spinner-border spinner-border-sm"
                  ></span>
                  {{ isSubmitting ? 'Wait...' : (isEditing ? 'Update' : 'Add')
                  }}
                </button>
                <button
                  type="button"
                  class="btn btn-danger btn-sm w-100 mt-1"
                  ng-if="isEditing"
                  ng-click="cancelEdit()"
                >
                  Cancel
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="loader-container" ng-if="isLoading">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2">Loading Products...</p>
      </div>

      <div ng-if="!isLoading">
        <table class="table table-bordered table-striped">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Product Name</th>
              <th>Description/Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr
              ng-repeat="product in products"
              ng-class="{'editing-row': product.id === productData.id}"
            >
              <td>{{ product.id }}</td>
              <td>{{ product.title }}</td>
              <td>{{ product.body }}</td>
              <td>
                <div class="btn-group" role="group">
                  <button
                    class="btn btn-sm btn-outline-secondary"
                    ng-click="startEdit(product)"
                  >
                    Edit
                  </button>
                  <button
                    class="btn btn-sm btn-outline-danger"
                    ng-click="deleteProduct(product.id)"
                    ng-disabled="product.isDeleting"
                  >
                    <span
                      ng-show="product.isDeleting"
                      class="spinner-border spinner-border-sm"
                    ></span>
                    {{ product.isDeleting ? '...' : 'Delete' }}
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope, ProductService) {
        $scope.products = [];
        $scope.productData = {};
        $scope.isLoading = true;
        $scope.isSubmitting = false;
        $scope.isEditing = false;

        ProductService.getProducts()
          .then(function (response) {
            $scope.products = response.data;
          })
          .finally(function () {
            $scope.isLoading = false;
          });

        $scope.startEdit = function (product) {
          $scope.isEditing = true;
          $scope.productData = angular.copy(product);
        };

        $scope.cancelEdit = function () {
          $scope.isEditing = false;
          $scope.productData = {};
          if ($scope.prodForm) {
            $scope.prodForm.$setPristine();
            $scope.prodForm.$setUntouched();
          }
        };

        // --- DELETE FUNCTION ---
        $scope.deleteProduct = function (id) {
          if (confirm("Are you sure you want to delete this product?")) {
            // Find the item locally to show a loading state on that specific row
            var product = $scope.products.find(function (p) {
              return p.id === id;
            });
            if (product) product.isDeleting = true;

            ProductService.deleteProduct(id)
              .then(function () {
                // Remove from local list upon success
                $scope.products = $scope.products.filter(function (p) {
                  return p.id !== id;
                });
                alert("Product deleted!");
              })
              .catch(function () {
                alert("Error deleting product.");
                if (product) product.isDeleting = false;
              });
          }
        };

        $scope.saveProduct = function () {
          $scope.isSubmitting = true;
          if ($scope.isEditing) {
            ProductService.updateProduct(
              $scope.productData.id,
              $scope.productData,
            )
              .then(function (response) {
                var idToFind = $scope.productData.id;
                for (var i = 0; i < $scope.products.length; i++) {
                  if ($scope.products[i].id === idToFind) {
                    $scope.products[i] = response.data;
                    break;
                  }
                }
                $scope.cancelEdit();
                alert("Product updated!");
              })
              .finally(function () {
                $scope.isSubmitting = false;
              });
          } else {
            ProductService.createProduct($scope.productData)
              .then(function (response) {
                $scope.products.unshift(response.data);
                $scope.productData = {};
                $scope.prodForm.$setPristine();
                $scope.prodForm.$setUntouched();
                alert("Product added!");
              })
              .finally(function () {
                $scope.isSubmitting = false;
              });
          }
        };
      });

      app.service("ProductService", function ($http) {
        var apiLink = "https://jsonplaceholder.typicode.com/posts";
        this.getProducts = function () {
          return $http.get(apiLink);
        };
        this.createProduct = function (product) {
          return $http.post(apiLink, product);
        };
        this.updateProduct = function (id, product) {
          return $http.patch(apiLink + "/" + id, product);
        };

        // ADDED DELETE METHOD
        this.deleteProduct = function (id) {
          return $http.delete(apiLink + "/" + id);
        };
      });
    </script>
  </body>
</html>
