<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Management</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      /* Optional: Custom style for a centered loader */
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
    </style>
  </head>

  <body ng-app="myApp" ng-controller="myCtrl">
    <div class="container mt-4">
      <h2 class="mb-4 text-center">User Management System</h2>

      <div class="card mb-5">
        <div class="card-header bg-primary text-white">Add New User</div>
        <div class="card-body">
          <form ng-submit="addUser()">
            <div class="row">
              <div class="col-md-5 mb-3">
                <label class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  ng-model="newUser.name"
                  placeholder="John Doe"
                  required
                />
              </div>
              <div class="col-md-5 mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  ng-model="newUser.email"
                  placeholder="john@example.com"
                  required
                />
              </div>
              <div class="col-md-2 mb-3 d-flex align-items-end">
                <button
                  type="submit"
                  class="btn btn-success w-100"
                  ng-disabled="isPosting"
                >
                  <span
                    ng-if="isPosting"
                    class="spinner-border spinner-border-sm"
                  ></span>
                  {{ isPosting ? 'Saving...' : 'Add User' }}
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="loader-container" ng-if="isLoading">
        <div
          class="spinner-grow text-primary"
          role="status"
          style="width: 3rem; height: 3rem"
        >
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-muted">Fetching user records...</p>
      </div>

      <div ng-if="!isLoading">
        <h3 class="mb-3">Existing Users</h3>
        <table class="table table-bordered table-striped">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="user in users">
              <td>{{ user.id }}</td>
              <td>{{ user.name }}</td>
              <td>{{ user.email }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      var app = angular.module("myApp", []);

      app.controller("myCtrl", function ($scope, $http) {
        $scope.apiLink = "https://jsonplaceholder.typicode.com/users";
        $scope.users = [];
        $scope.newUser = {};

        // Flags for loaders
        $scope.isLoading = true; // For initial table fetch
        $scope.isPosting = false; // For the form submission

        // Fetch initial users
        $http
          .get($scope.apiLink)
          .then(function (response) {
            $scope.users = response.data;
          })
          .finally(function () {
            // .finally runs regardless of success or error
            $scope.isLoading = false;
          });

        // POST - Add a new user
        $scope.addUser = function () {
          $scope.isPosting = true; // Show loading state on button

          $http
            .post($scope.apiLink, $scope.newUser)
            .then(function (response) {
              alert("User added successfully!");
              $scope.users.unshift(response.data);
              $scope.newUser = {};
            })
            .finally(function () {
              $scope.isPosting = false; // Hide loading state on button
            });
        };
      });
    </script>
  </body>
</html>
