<div class="container mt-5 bg-black text-white p-5">
  <h1>User details</h1>

  <div ng-if="user">
    <ul class="row mt-5">
      <div class="col">{{user.name}}</div>
      <div class="col">{{user.email}}</div>
      <div class="col">{{user.created_at|date:"medium"}}</div>
    </ul>
  </div>
</div>
